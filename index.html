<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudier</title>
    <style>
        body {
            font-family: 'Microsoft YaHei Light', 'Microsoft YaHei', sans-serif; /* 使用微软轻体 */
            color: #00b7d0; /* 浅青色文字 */
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh; /* 设置视口高度为100% */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column; /* 垂直排列内容 */
            background: #003366; /* 初始深蓝色背景 */
            animation: backgroundFade 5s linear forwards; /* 背景渐变动画，时间为5秒 */
        }

        h1 {
            font-size: 6rem; /* 初始字体大小 */
            background: linear-gradient(to bottom, #ffffff, #00b7d0); /* 标题文字渐变色 */
            -webkit-background-clip: text; /* 使背景只应用于文字 */
            color: transparent; /* 文字颜色透明，背景色用于填充 */
            animation: moveUp 2s forwards, scaleText 2s forwards, fadeIn 2s forwards;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5); /* 添加文字阴影 */
        }

        p {
            font-size: 1.5rem;
            opacity: 0; /* 初始不可见 */
            transform: translateX(-100%); /* 初始位置：从左侧外部 */
            background: linear-gradient(to bottom, #ffffff, #00b7d0); /* 与标题一致的渐变背景 */
            -webkit-background-clip: text; /* 使背景只应用于文字 */
            color: transparent; /* 文字颜色透明 */
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5); /* 添加文字阴影 */
            animation: textSlideIn 1s ease-in-out 3s forwards; /* 延迟3秒，持续1秒，从两侧滑入 */
        }

        @keyframes moveUp {
            0% {
                transform: translateY(50%) scale(2); /* 从屏幕中间开始，放大 */
            }
            100% {
                transform: translateY(-50vh) scale(1); /* 向上移动并缩小 */
            }
        }

        @keyframes scaleText {
            0% {
                transform: scale(2); /* 初始是放大的状态 */
            }
            100% {
                transform: scale(1); /* 缩小到正常大小 */
            }
        }

        @keyframes fadeIn {
            0% {
                opacity: 0; /* 开始时不可见 */
            }
            100% {
                opacity: 1; /* 结束时完全可见 */
            }
        }

        @keyframes textSlideIn {
            0% {
                opacity: 0; /* 初始不可见 */
                transform: translateX(-100%); /* 从左侧滑入 */
            }
            50% {
                opacity: 1; /* 中途完全可见 */
                transform: translateX(0); /* 靠拢到中间 */
            }
            100% {
                transform: translateX(0); /* 靠拢到中间 */
            }
        }

        @keyframes backgroundFade {
            0% {
                background: #003366; /* 初始深蓝色 */
            }
            100% {
                background: #ffffff; /* 结束时白色 */
            }
        }
    </style>
</head>
<body>
    <h1>Cloudier</h1>
    <p>这是一位清远初中生正在调试自己的个人博客</p>
</body>
</html>

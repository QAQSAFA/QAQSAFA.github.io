<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudier</title>
    <style>
        body {
            font-family: 'Microsoft YaHei Light', 'Microsoft YaHei', sans-serif; /* 使用微软轻体 */
            color: #00b7d0; /* 浅青色文字 */
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh; /* 设置视口高度为100% */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column; /* 垂直排列内容 */
            animation: backgroundChange 5s infinite alternate; /* 背景颜色渐变动画 */
            overflow: hidden; /* 防止滚动条 */
        }

        h1 {
            font-size: 6rem; /* 初始字体大小 */
            animation: moveUp 2s forwards, scaleText 2s forwards;
        }

        p {
            font-size: 1.5rem;
            opacity: 0; /* 初始不可见 */
            animation: fadeIn 2s forwards 2s; /* 延迟2秒后淡入 */
        }

        @keyframes moveUp {
            0% {
                transform: translateY(50%) scale(2); /* 从屏幕中间开始，放大 */
            }
            100% {
                transform: translateY(-50vh) scale(1); /* 向上移动并缩小 */
            }
        }

        @keyframes scaleText {
            0% {
                transform: scale(2); /* 初始是放大的状态 */
            }
            100% {
                transform: scale(1); /* 缩小到正常大小 */
            }
        }

        @keyframes fadeIn {
            0% {
                opacity: 0; /* 开始时不可见 */
            }
            100% {
                opacity: 1; /* 结束时完全可见 */
            }
        }

        /* 背景色渐变动画 */
        @keyframes backgroundChange {
            0% {
                background: #003366; /* 初始深蓝色 */
            }
            25% {
                background: #00b7d0; /* 浅青色 */
            }
            50% {
                background: #ff7f00; /* 橙色 */
            }
            75% {
                background: #1e90ff; /* 深蓝色 */
            }
            100% {
                background: #8a2be2; /* 紫色 */
            }
        }
    </style>
</head>
<body>
    <h1>Cloudier</h1>
    <p>这是一位清远初中生正在调试自己的个人博客</p>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudier</title>
    <style>
        body {
            font-family: 'Microsoft YaHei Light', 'Microsoft YaHei', sans-serif; /* 使用微软轻体 */
            color: #00b7d0; /* 浅青色文字 */
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh; /* 设置视口高度为100% */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column; /* 垂直排列内容 */
            background: linear-gradient(to bottom, #003366, #00b7d0); /* 初始背景渐变色（深蓝到浅青色） */
            animation: backgroundFade 2.5s ease-out forwards; /* 背景渐变动画 */
        }

        h1 {
            font-size: 6rem; /* 初始字体大小 */
            animation: moveUp 2s forwards, scaleText 2s forwards, fadeIn 2s forwards;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5); /* 添加文字阴影 */
        }

        p {
            font-size: 1.5rem;
            opacity: 0; /* 初始不可见 */
            animation: fadeIn 2s forwards 2s; /* 延迟2秒后淡入 */
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5); /* 添加文字阴影 */
        }

        @keyframes moveUp {
            0% {
                transform: translateY(50%) scale(2); /* 从屏幕中间开始，放大 */
            }
            100% {
                transform: translateY(-50vh) scale(1); /* 向上移动并缩小 */
            }
        }

        @keyframes scaleText {
            0% {
                transform: scale(2); /* 初始是放大的状态 */
            }
            100% {
                transform: scale(1); /* 缩小到正常大小 */
            }
        }

        @keyframes fadeIn {
            0% {
                opacity: 0; /* 开始时不可见 */
            }
            100% {
                opacity: 1; /* 结束时完全可见 */
            }
        }

        @keyframes backgroundFade {
            0% {
                background: linear-gradient(to bottom, #003366, #00b7d0); /* 初始深蓝到浅青色 */
            }
            100% {
                background: linear-gradient(to bottom, #ffffff, #ffffff); /* 渐变到白色 */
            }
        }
    </style>
</head>
<body>
    <h1>Cloudier</h1>
    <p>这是一位清远初中生正在调试自己的个人博客</p>
</body>
</html>

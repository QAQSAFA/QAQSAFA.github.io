<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudier</title>
    <style>
        body {
            font-family: 'Microsoft YaHei Light', 'Microsoft YaHei', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: #003366;
            animation: backgroundFade 5s linear forwards;
        }

        h1 {
            font-size: 6rem;
            background: linear-gradient(to bottom, #ffffff, #00b7d0);
            -webkit-background-clip: text;
            color: transparent;
            animation: fadeIn 2s forwards, scaleText 2s forwards;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            transition: transform 1s ease-in-out;
        }

        p {
            font-size: 1.5rem;
            opacity: 0;
            position: relative;
            display: inline-block;
            background: linear-gradient(to bottom, #ffffff, #00b7d0);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            animation: textGather 1s ease-in-out 3s forwards;
            transition: transform 1s ease-in-out;
        }

        #more-btn {
            font-size: 1.5rem;
            padding: 10px 20px;
            margin-top: 20px;
            opacity: 0;
            background: linear-gradient(to right, #00b7d0, #00ff88);
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            animation: fadeIn 2s ease-in-out 5s forwards, jellyBounce 1s infinite 6s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: opacity 1s ease, transform 1s ease;
        }

        .separator {
            width: 80%;
            height: 2px;
            background: linear-gradient(to right, #00b7d0, #00ff88);
            opacity: 0;
            margin: 20px auto;
            animation: fadeIn 2s ease-in-out forwards;
        }

        .separator:nth-of-type(1) {
            animation-delay: 1s;
        }

        .separator:nth-of-type(2) {
            animation-delay: 1.5s;
        }

        @keyframes scaleText {
            0% {
                transform: scale(2);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        @keyframes textGather {
            0% {
                opacity: 0;
                letter-spacing: 20px;
            }
            100% {
                opacity: 1;
                letter-spacing: normal;
            }
        }

        @keyframes backgroundFade {
            0% {
                background: #003366;
            }
            100% {
                background: #ffffff;
            }
        }

        @keyframes jellyBounce {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.1);
            }
            50% {
                transform: scale(0.9);
            }
        }

        /* 点击后的样式 */
        .shifted {
            transform: translateY(-10vh); /* 主标题向上移动至距离顶部 -10vh */
        }

        .shifted-subtitle {
            transform: translateY(-20vh); /* 副标题紧随主标题，向上移动至距离顶部 -20vh */
        }

        .fade-out {
            opacity: 0;
            transform: scale(0.5);
        }
    </style>
</head>
<body>
    <h1 id="title">Cloudier</h1>
    <p id="subtitle">这是一位清远初中生正在调试自己的个人博客</p>
    <button id="more-btn">了解更多</button>
    <div class="separator" id="sep1"></div>
    <div class="separator" id="sep2"></div>

    <script>
        const button = document.getElementById("more-btn");
        const title = document.getElementById("title");
        const subtitle = document.getElementById("subtitle");
        const sep1 = document.getElementById("sep1");
        const sep2 = document.getElementById("sep2");

        // 隐藏分隔符，初始不显示
        sep1.style.display = "none";
        sep2.style.display = "none";

        button.addEventListener("click", () => {
            // 给主标题和副标题分别添加动画
            title.classList.add("shifted"); // 主标题向上移动
            subtitle.classList.add("shifted-subtitle"); // 副标题紧随其后向上移动

            // 显示分隔符
            sep1.style.display = "block";
            sep2.style.display = "block";

            // 给按钮添加淡出效果并在动画结束后隐藏
            button.classList.add("fade-out");
            setTimeout(() => {
                button.style.display = "none";
            }, 1000); // 等待1秒以完成淡出动画
        });
    </script>
</body>
</html>
